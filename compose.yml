services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    expose:
      - "3000"

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    ports:
      - "9980:80"
    depends_on:
      - server
    restart: unless-stopped
    args:
      - VITE_BASE_URL=/dash/
