server {
    listen 80;

    # Proxy /rpc to the server container
    location /rpc {
        proxy_pass http://server:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Serve the Vite SPA — fallback to index.html for client-side routing
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }


    # Proxy /dash/rpc to the server container
    location /dash/rpc {
        proxy_pass http://server:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Serve the Vite SPA — fallback to index.html for client-side routing
    location /dash/ {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
