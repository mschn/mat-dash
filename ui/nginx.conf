server {
    listen 80;
    server_name localhost;

    # All requests for the SPA are served from the /dash/ path
    location /dash/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /dash/index.html;
    }

    # Proxy RPC requests to the backend server
    # This handles both /rpc and /dash/rpc
    location ~ ^/(dash/)?rpc {
        proxy_pass http://server:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redirect the root path to your application
    location = / {
        return 301 /dash/;
    }
}